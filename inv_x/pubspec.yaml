name: inv_x
description: "INV-X — AI-Powered Autonomous Inventory Management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5

  # Networking
  dio: ^5.7.0

  # UI
  fl_chart: ^0.70.2
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

  # Camera & Scanner
  mobile_scanner: ^6.0.5
  camera: ^0.11.1
  google_mlkit_text_recognition: ^0.14.0

  # Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # PDF & Excel
  pdf: ^3.11.2
  printing: ^5.13.5
  excel: ^4.0.6

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  permission_handler: ^11.4.0
  connectivity_plus: ^6.1.2

  # Icons
  phosphor_flutter: ^2.1.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
    - .env
